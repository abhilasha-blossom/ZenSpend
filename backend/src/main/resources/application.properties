spring.application.name=backend

# Database Configuration (Infers driver automatically from URL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:zenspenddb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update

# H2 Console (for debugging, will respond on live but secure it with credentials if needed)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Frontend URL for CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
